<div class="modal-perfil-overlay" (click)="aoFechar.emit()">
  <div class="modal-perfil-card" (click)="$event.stopPropagation()">
    <div class="modal-perfil-header">
      <h3>Editar Perfil</h3>
      <button class="btn-fechar-modal" (click)="aoFechar.emit()">&times;</button>
    </div>

    <div class="modal-perfil-body">
      <div class="edit-avatar-section">
        <div class="avatar-preview">
          <img [src]="previewFoto || usuario?.foto || 'img/none.svg'" alt="Preview">
        </div>
        <label for="foto-perfil-upload" class="btn-upload-foto">
          📷 Alterar Foto de Perfil
        </label>
        <input type="file" id="foto-perfil-upload" accept="image/*" class="input-file-hidden" (change)="onFotoSelecionada($event)">
      </div>

      <div class="form-perfil-grupo">
        <label>Nome:</label>
        <input type="text" [(ngModel)]="dadosEdicao.nome" placeholder="Seu nome">
      </div>

      <div class="form-perfil-grupo">
        <label>Sobrenome:</label>
        <input type="text" [(ngModel)]="dadosEdicao.sobrenome" placeholder="Seu sobrenome">
      </div>

      <div class="form-perfil-grupo">
        <label>Bio (Sobre você):</label>
        <textarea [(ngModel)]="dadosEdicao.bio" placeholder="Fale um pouco sobre você..." rows="4"></textarea>
      </div>
    </div>

    <div class="modal-perfil-footer">
      <button class="btn-cancelar" (click)="aoFechar.emit()">Cancelar</button>
      <button class="btn-salvar" (click)="salvar()">Salvar Alterações</button>
    </div>
  </div>
</div>
