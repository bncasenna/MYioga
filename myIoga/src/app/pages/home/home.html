<app-header />
<main class="container">
    <h1>Bem-vindo ao MYioga</h1>
    <p>Escolha o tipo de acesso para entrar no seu painel.</p>

    <div class="botoes-acesso">
        <button class="botao-principal" id="btnAluno">Entrar como Aluno</button>
        <button class="botao-principal" id="btnProf">Entrar como Professor</button>
    </div>
</main>

<div class="modal-overlay" id="modalOverlay">

    <div class="modal-box">
        <button class="fechar-modal" id="fecharModal">&times;</button>

        <h2 id="tituloModal">Login</h2>

        <form id="formLogin">
            <label for="usuario">Usuário ou E-mail</label>
            <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

            <button type="submit" class="botao-entrar">Entrar</button>
        </form>
    </div>
</div>
